  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-5Q94FLN3"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>

    <!-- El Header se cargará aquí -->
    <div id="header-placeholder"></div>

    <main>
      <section class="hero-section" style="min-height: 60vh; padding-bottom: 80px;">
        <div class="container hero-container">
          <div class="hero-text">
            <span class="subtitle">HERRAMIENTAS</span>
            <h1>Calculadora de Divisas</h1>
            <p>Convierte valores entre las principales divisas con tasas actualizadas en tiempo real.</p>
          </div>
        </div>
      </section>

      <section class="container animate-up" style="padding-bottom: 80px;">
        <div class="currency-calculator-container">
          <div class="currency-calculator">
            <div class="calculator-header">
              <i class="fas fa-exchange-alt"></i>
              <h3>Conversor</h3>
              <div class="header-actions">
                <button class="action-btn" id="openCalcBtn" title="Abrir Calculadora">
                  <i class="fas fa-calculator"></i>
                </button>
                <button class="action-btn" id="clearConverterBtn" title="Limpiar Conversor">
                  <i class="fas fa-eraser"></i>
                </button>
                <button class="action-btn" id="refreshRates" title="Actualizar tasas">
                  <i class="fas fa-sync-alt"></i>
                </button>
              </div>
            </div>
            <div class="calculator-body">
              <div class="currency-input-group">
                <label>Cantidad</label>
                <input
                  type="number"
                  id="amount"
                  placeholder="Ingresa cantidad"
                  value="1"
                  min="0"
                  step="1"
                />
              </div>
              <div class="currency-select-group">
                <div class="currency-from">
                  <label>De</label>
                  <select id="fromCurrency">
                    <option value="COP">🇨🇴 Peso Colombiano</option>
                    <option value="VES">🇻🇪 Bolívar</option>
                    <option value="USD" selected>🇺🇸 Dólar Americano</option>
                    <option value="EUR">🇪🇺 Euro</option>
                  </select>
                </div>
                <button
                  class="swap-btn"
                  id="swapBtn"
                  title="Intercambiar monedas"
                >
                  <i class="fas fa-exchange-alt"></i>
                </button>
                <div class="currency-to">
                  <label>A</label>
                  <select id="toCurrency">
                    <option value="COP">🇨🇴 Peso Colombiano</option>
                    <option value="VES" selected>🇻🇪 Bolívar</option>
                    <option value="USD">🇺🇸 Dólar Americano</option>
                    <option value="EUR">🇪🇺 Euro</option>
                  </select>
                </div>
              </div>
              <div class="result-display">
                <div class="result-amount" id="resultAmount">$0.00</div>
                <div class="exchange-rate" id="exchangeRate">
                  Cargando tasas...
                </div>
                <div class="last-update" id="lastUpdate"></div>
              </div>
              <button class="calculate-btn" id="calculateBtn">
                <i class="fas fa-calculator"></i> Calcular
              </button>
              <div class="info-note">
                <i class="fas fa-info-circle"></i>
                <p>Tasas obtenidas de una fuente externa.</p>
              </div>
              <div
                class="loading-overlay"
                id="loadingOverlay"
                style="display: none"
              >
                <div class="spinner"></div>
                <p>Actualizando tasas...</p>
              </div>
            </div>
          </div>

          <!-- CALCULADORA SENCILLA (Oculta por defecto) -->
          <div class="simple-calculator" id="simpleCalculator" style="display: none;">
            <div class="calc-header">
              <h3>Calculadora</h3>
              <button class="close-calc-btn" id="closeCalcBtn" title="Cerrar"><i class="fas fa-times"></i></button>
            </div>
            <div class="calc-display">
              <input type="text" id="calcDisplay" readonly value="0">
            </div>
            <div class="calc-keys">
              <button class="calc-key operator" data-action="clear">C</button>
              <button class="calc-key operator" data-action="/">&divide;</button>
              <button class="calc-key operator" data-action="*">&times;</button>
              <button class="calc-key operator" data-action="backspace"><i class="fas fa-backspace"></i></button>
              
              <button class="calc-key" data-number="7">7</button>
              <button class="calc-key" data-number="8">8</button>
              <button class="calc-key" data-number="9">9</button>
              <button class="calc-key operator" data-action="-">-</button>
              
              <button class="calc-key" data-number="4">4</button>
              <button class="calc-key" data-number="5">5</button>
              <button class="calc-key" data-number="6">6</button>
              <button class="calc-key operator" data-action="+">+</button>
              
              <button class="calc-key" data-number="1">1</button>
              <button class="calc-key" data-number="2">2</button>
              <button class="calc-key" data-number="3">3</button>
              <button class="calc-key equals" data-action="calculate">=</button>
              
              <button class="calc-key zero" data-number="0">0</button>
              <button class="calc-key" data-number=".">.</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- El Footer se cargará aquí -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
  </body>
</html>
